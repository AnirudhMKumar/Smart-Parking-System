name: smartps
description: Smart Parking System - AI-powered license plate recognition & reservations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.8.1
  dio: ^5.7.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.5
  web_socket_channel: ^3.0.2
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
